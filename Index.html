<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Racha Pro</title>
</head>

<body style="font-family: Arial; text-align:center; background:#111; color:white; max-width:500px; margin:auto;">

<h1>🎮 Racha Pro</h1>

<h3 id="mensajeHora"></h3>

<p>💵 ₡<span id="efectivo">0</span></p>
<p>🔥 Racha: <span id="racha">0</span></p>
<p>⭐ XP: <span id="xp">0</span></p>

<h2 id="estado">Listo</h2>

<hr>

<h3>⏱️ Temporizador</h3>
<p id="timer">00:00</p>
<button onclick="iniciarTimer()">▶️ Trabajar</button>
<button onclick="detenerTimer()">⏹️ Terminar</button>

<hr>

<button onclick="menu()">⚙️ Menú</button>

<script>

// DATOS
let data = JSON.parse(localStorage.getItem("data")) || {
  efectivo: 0,
  xp: 0,
  racha: 0,
  ultimoDia: null
};

// GUARDAR
function guardar(){
  localStorage.setItem("data", JSON.stringify(data));
}

// RELOJ / MENSAJE
function revisarHora(){
  let hora = new Date().getHours();
  let msg = "";

  if(hora < 10) msg = "🌅 Temprano, vas bien";
  else if(hora < 14) msg = "😐 Ya deberías estar activo";
  else if(hora < 18) msg = "⚠️ Vas tarde";
  else msg = "💀 Muy tarde, reaccioná";

  document.getElementById("mensajeHora").innerText = msg;
}

// DÍA REAL
function revisarDia(){
  let hoy = new Date().toDateString();

  if(data.ultimoDia != hoy){
    data.ultimoDia = hoy;
    data.racha = 0; // reinicia si no hiciste nada
  }
}

// TIMER
let tiempo = 0;
let intervalo = null;

function iniciarTimer(){
  if(intervalo) return;

  intervalo = setInterval(()=>{
    tiempo++;
    let min = Math.floor(tiempo / 60);
    let seg = tiempo % 60;

    document.getElementById("timer").innerText =
      (min<10?"0":"")+min + ":" + (seg<10?"0":"")+seg;
  },1000);
}

function detenerTimer(){
  clearInterval(intervalo);
  intervalo = null;

  let ganado = tiempo * 50;

  data.efectivo += ganado;
  data.xp += ganado;
  data.racha++;

  sonido();

  alert("Ganaste ₡" + ganado);

  tiempo = 0;
  document.getElementById("timer").innerText = "00:00";

  guardar();
  actualizar();
}

// SONIDO
function sonido(){
  let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
  audio.play();
}

// MENÚ
function menu(){
  let op = prompt(
`⚙️ MENÚ

1. Día débil
2. Corregir dinero
3. Reset

Número:`);

  if(op=="1"){
    data.efectivo += 2000;
    data.racha++;
    alert("🧠 Día débil guardado");
  }

  if(op=="2"){
    let m = parseInt(prompt("Monto"))||0;
    data.efectivo += m;
  }

  if(op=="3"){
    data.racha = 0;
    data.xp = 0;
    alert("Reset hecho");
  }

  guardar();
  actualizar();
}

// UI
function actualizar(){
  document.getElementById("efectivo").innerText = data.efectivo;
  document.getElementById("racha").innerText = data.racha;
  document.getElementById("xp").innerText = data.xp;
}

// INICIO
revisarHora();
revisarDia();
actualizar();

</script>

</body>
</html>
